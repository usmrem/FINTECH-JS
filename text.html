<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hangman</title>
</head>
<body>

<script>
  let pickRandomWord = function (words) {
    return words[Math.floor(Math.random() * words.length)];
  };

  let randomWords = ["Planet", "Worm", "Flower", "Computer"];
  pickRandomWord(randomWords);
  console.log(randomWords);


</script>

</body>
